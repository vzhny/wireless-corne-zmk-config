<h1>Corne — nice!view Display States</h1>
<p class="sub">68×160 Sharp LCD · inverted · 2× scale · JetBrains Mono</p>
<div class="grid" id="root"></div>
<script>
function btSvg(vis){
  const op=vis?1:0.18;
  return '<div class="bt"><svg width="10" height="18" viewBox="0 0 10 18" fill="none" opacity="'+op+'">'
    +'<line x1="5" y1="1" x2="5" y2="17" stroke="var(--display-fg)" stroke-width="1.5"/>'
    +'<polyline points="5,2 9,6 5,10" stroke="var(--display-fg)" stroke-width="1.5" fill="none" stroke-linejoin="round"/>'
    +'<polyline points="5,10 9,14 5,17" stroke="var(--display-fg)" stroke-width="1.5" fill="none" stroke-linejoin="round"/>'
    +'</svg></div>';
}

function wifiSvg(connected){
  const op = connected ? 1 : 0.22;
  const fg = 'var(--display-fg)';
  // Pixel-art matching wifi_map bitmap (2x scale: viewBox 28x28, SVG 14x14 CSS px)
  // Lit pixels (bitmap col x, row y):
  //   row1 crest:  x=3..10 -> vb(6,2) w=16
  //   row2 sides:  x=2,11  -> vb(4,4) and vb(22,4)
  //   row3 sides:  x=1,12  -> vb(2,6) and vb(24,6)
  //   row5 crest:  x=5..8  -> vb(10,10) w=8
  //   row6 sides:  x=4,9   -> vb(8,12) and vb(18,12)
  //   row8 dot:    x=6,7   -> vb(12,16) w=4
  function p(x,y,w,h){ return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+(h||2)+'" fill="'+fg+'"/>'; }
  return '<div class="twr"><svg width="14" height="14" viewBox="0 0 28 28" opacity="'+op+'">'
    + p(6,2,16)
    + p(4,4,2) + p(22,4,2)
    + p(2,6,2) + p(24,6,2)
    + p(10,10,8)
    + p(8,12,2) + p(18,12,2)
    + p(12,16,4)
    + '</svg></div>';
}

function altSVG(){
  // Pixel-art ⎇ glyph matching alt_map bitmap (2x scale, currentColor for active/inactive)
  // Lit pixels (bitmap): row2:x=7  row3:x=6-8  row4:x=5-9  rows5-8:x=7  row9:x=5-9
  function p(x,y,w,h){ return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+(h||2)+'" fill="currentColor"/>'; }
  return '<svg width="12" height="12" viewBox="0 0 28 28" style="display:block;margin:auto">'
    + p(14,4,2)
    + p(12,6,6)
    + p(10,8,10)
    + p(14,10,2)
    + p(14,12,2)
    + p(14,14,2)
    + p(14,16,2)
    + p(10,18,10)
    + '</svg>';
}

function battUnit(pct,chg){
  const w = Math.max(0, Math.round(27*pct/100));
  const low = pct <= 20;
  return '<div class="bu"><div class="batt"><div class="bs2">'
    + '<div class="bf' + (low?' low':'') + '" style="width:'+w+'px"></div>'
    + (chg ? '<div class="bb">&#9889;</div>' : '')
    + '</div><div class="bt2"></div></div>'
    + '<span class="tx">'+pct+'%</span></div>';
}

function G(sym,on){
  return '<div class="g'+(on?' on':'')+'">'+sym+'</div>';
}
function C(n,active){
  return '<div class="c'+(active===n?' on':'')+'">'+n+'</div>';
}
function circles(from,to,active){
  var s='';
  for(var i=from;i<=to;i++) s+=C(i,active);
  return s;
}

function L(o){
  var btState=o.btState||'connected', btProfile=o.btProfile||0,
      batt=o.batt||75, charging=o.charging||false,
      mods=o.mods||[0,0,0,0], isMac=o.isMac||false,
      layer=o.layer||'Qwerty (Win)', activeLayer=o.activeLayer||0;
  var s=mods[0],c=mods[1],g=mods[2],a=mods[3];
  var btVis = btState !== 'search-off';
  var gs = isMac
    ? [G('&#8679;',s), G('&#8984;',g), G('&#8963;',c), G('&#8997;',a)]
    : [G('&#8679;',s), G('&#8963;',c), G('&#8862;',g), G(altSVG(),a)];
  return '<div class="display"><div class="di">'
    + '<div class="ts">'
    + '<div class="ts-a">'+btSvg(btVis)+battUnit(batt,charging)+'</div>'
    + '<div class="ts-b"><span class="tx b">BT '+btProfile+'</span></div>'
    + '</div>'
    + '<div class="ms"><div class="ms-g">'+gs.join('')+'</div></div>'
    + '<div class="bs">'
    + '<div class="bs-c1">'+circles(1,5,activeLayer)+'</div>'
    + '<div class="bs-c2">'+circles(6,9,activeLayer)+'</div>'
    + '<div class="bs-l">'+layer+'</div>'
    + '</div></div></div>';
}

function R(o){
  var connected=o.connected!==false, batt=o.batt||75,
      mods=o.mods||[0,0,0,0], isMac=o.isMac||false;
  var ra=mods[0],rg=mods[1],rc=mods[2],rs=mods[3];
  var gs = isMac
    ? [G('&#8997;',ra), G('&#8963;',rc), G('&#8984;',rg), G('&#8679;',rs)]
    : [G(altSVG(),ra), G('&#8862;',rg), G('&#8963;',rc), G('&#8679;',rs)];
  return '<div class="display"><div class="di">'
    + '<div class="ts"><div class="ts-a">'+wifiSvg(connected)+battUnit(batt,false)+'</div></div>'
    + '<div class="ms"><div class="ms-g">'+gs.join('')+'</div></div>'
    + '<div class="bs"></div></div></div>';
}

function row(lbl,html){
  return '<div class="sw"><div class="sl">'+lbl.replace(/\n/g,'<br>')+'</div>'+html+'</div>';
}

var left = [
  row('Qwerty (Win)\nBT 0 connected\n75% base layer', L({layer:'Qwerty (Win)',activeLayer:0})),
  row('Qwerty (Mac)\nBT 0 90%\nlayer 1 active', L({batt:90,isMac:true,layer:'Qwerty (Mac)',activeLayer:1})),
  row('Colemak (Win)\nBT 0 60%\nlayer 2 active', L({batt:60,layer:'Colemak (Win)',activeLayer:2})),
  row('Numbers\nBT 0 50%\nlayer 4 active', L({batt:50,layer:'Numbers',activeLayer:4})),
  row('Symbols\nBT 2 searching\n80% layer 6', L({btState:'search-on',btProfile:2,batt:80,layer:'Symbols',activeLayer:6})),
  row('Function Keys\nBT 0 45% charging\nlayer 8 active', L({batt:45,charging:true,layer:'Function Keys',activeLayer:8})),
];

var right = [
  row('Qwerty (Win)\nConnected 80%\nno mods', R({batt:80})),
  row('Qwerty (Win)\nConnected 65%\nR-Shift held', R({batt:65,mods:[0,0,0,1]})),
  row('Colemak (Mac)\nConnected 70%\nR-GUI held', R({batt:70,isMac:true,mods:[0,1,0,0]})),
  row('Disconnected 14%', R({connected:false,batt:14})),
];

document.getElementById('root').innerHTML =
  '<div><div class="col-title">Left half &middot; central</div><div class="states-col">'+left.join('')+'</div></div>'
  + '<div><div class="col-title">Right half &middot; peripheral</div><div class="states-col">'+right.join('')+'</div></div>';
</script>
